name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (passed to release-it)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Must run from main only — enforced by the job condition below.
permissions:
  contents: write   # push version commit + tags
  id-token: write   # npm provenance attestation

jobs:
  publish:
    name: Version & Publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run tests
        run: pnpm --filter "@fluxwind/core" test

      - name: Build
        run: pnpm build

      - name: Run release-it
        working-directory: packages/core
        run: npx release-it ${{ inputs.release-type }} --ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
